window:
  dimensions:
    columns: 0
    lines: 0
  padding:
    x: 12
    y: 12

  dynamic_padding: true

  decorations: none # full|none

  startup_mode: Maximized # Windowes|Maximized|Fullscreen|(macOS SimpleFullscreen)

  title: Alacritty

background_opacity: 1.0

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: 'DejaVuSansMono Nerd Font Mono'

  size: 12.0

  offset:
    x: 1
    y: 6

  glyph_offset:
    x: 0
    y: 3

# Color schemes
schemes:
  uwu: &uwu
    primary:
      background: '#131A1C'
      foreground: '#C5C8C9'

    # Colors the cursor will use if `custom_cursor_colors` is true
    cursor:
      text: '#d6d6d6'
      cursor: '#232a2c'

    # Normal colors
    normal:
      black:   '#1b2224'
      red:     '#f65b5b'
      green:   '#6bb05d'
      yellow:  '#e59e67'
      blue:    '#53A7BF'
      magenta: '#bb8fe5'
      cyan:    '#51a39f'
      white:   '#c4c4c4'

    # Bright colors
    bright:
      black:   '#232a2c'
      red:     '#c26f6f'
      green:   '#8dc776'
      yellow:  '#e7ac7e'
      blue:    '#6CBAD1'
      magenta: '#b185db'
      cyan:    '#6db0ad'
      white:   '#cecece'

  tender: &tender
    primary:
      background: '#282828'
      foreground: '#eeeeee'

    # Normal colors
    normal:
      black:   '#282828'
      red:     '#f43753'
      green:   '#c9d05c'
      yellow:  '#ffc24b'
      blue:    '#b3deef'
      magenta: '#d3b987'
      cyan:    '#73cef4'
      white:   '#eeeeee'

    # Bright colors
    bright:
      black:   '#4c4c4c'
      red:     '#f43753'
      green:   '#c9d05c'
      yellow:  '#ffc24b'
      blue:    '#b3deef'
      magenta: '#d3b987'
      cyan:    '#73cef4'
      white:   '#feffff'

  everforest_dark_hard: &everforest_dark_hard
    primary:
      background: '#2b3339'
      foreground: '#d3c6aa'
    normal:
      black:   '#4b565c'
      red:     '#e67e80'
      green:   '#a7c080'
      yellow:  '#dbbc7f'
      blue:    '#7fbbb3'
      magenta: '#d699b6'
      cyan:    '#83c092'
      white:   '#d3c6aa'
    bright:
      black:   '#4b565c'
      red:     '#e67e80'
      green:   '#a7c080'
      yellow:  '#dbbc7f'
      blue:    '#7fbbb3'
      magenta: '#d699b6'
      cyan:    '#83c092'
      white:   '#d3c6aa'

  srcery: &srcery
    primary:
      background: '#1c1b19'
      foreground: '#fce8c3'

    # Cursor colors
    cursor:
      text: CellBackground
      cursor: '#fbb829'

    # Normal colors
    normal:
      black:   '#1c1b19'
      red:     '#ef2f27'
      green:   '#519f50'
      yellow:  '#fbb829'
      blue:    '#2c78bf'
      magenta: '#e02c6d'
      cyan:    '#0aaeb3'
      white:   '#baa67f'

    # Bright colors
    bright:
      black:   '#918175'
      red:     '#f75341'
      green:   '#98bc37'
      yellow:  '#fed06e'
      blue:    '#68a8e4'
      magenta: '#ff5c8f'
      cyan:    '#2be4d0'
      white:   '#fce8c3'
  gruvbox: &gruvbox
    primary:
      background: '#1d2021'
      # medium contrast background = '#282828'
      # soft contrast: background = '#32302f'
      foreground: '#ebdbb2'

    # Normal colors
    normal:
      black:   '#282828'
      red:     '#cc241d'
      green:   '#98971a'
      yellow:  '#d79921'
      blue:    '#458588'
      magenta: '#b16286'
      cyan:    '#689d6a'
      white:   '#a89984'

    # Bright colors
    bright:
      black:   '#928374'
      red:     '#fb4934'
      green:   '#b8bb26'
      yellow:  '#fabd2f'
      blue:    '#83a598'
      magenta: '#d3869b'
      cyan:    '#8ec07c'
      white:   '#ebdbb2'

  # TokyoNight
  tokyonight: &tokyonight
    # Default colors
    primary:
      background: '#1a1b26'
      foreground: '#c0caf5'

    # Normal colors
    normal:
      black:   '#15161E'
      red:     '#f7768e'
      green:   '#9ece6a'
      yellow:  '#e0af68'
      blue:    '#7aa2f7'
      magenta: '#bb9af7'
      cyan:    '#7dcfff'
      white:   '#a9b1d6'

    # Bright colors
    bright:
      black:   '#414868'
      red:     '#f7768e'
      green:   '#9ece6a'
      yellow:  '#e0af68'
      blue:    '#7aa2f7'
      magenta: '#bb9af7'
      cyan:    '#7dcfff'
      white:   '#c0caf5'

    indexed_colors:
      - { index: 16, color: '#ff9e64' }
      - { index: 17, color: '#db4b4b' }

# Colors (Tender)
colors: *tokyonight

selection:
  save_to_clipboard: true

cursor:
  style: Block # Block|Underline|Beam

live_config_reload: true

# shell:
#   program: /bin/zsh

mouse:
  double_click: { threshold: 300 }
  triple_click: { threshold: 300 }

  hide_when_typing: true

